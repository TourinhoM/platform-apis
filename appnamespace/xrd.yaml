apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xappnamespaces.platform.lab
spec:
  group: platform.lab

  # tipo cluster-scoped (interno do Crossplane)
  names:
    kind: XAppNamespace
    plural: xappnamespaces

  # tipo que o time de app cria (namespace-scoped)
  claimNames:
    kind: AppNamespace
    plural: appnamespaces

  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                teamName:
                  type: string
                  description: Nome do time dono do namespace (usado como label)
                # Bounded self-service: o dev escolhe um TAMANHO do cardápio, não
                # números livres. A Composition mapeia size → ResourceQuota.
                # Default small → o caso comum não precisa nem declarar.
                size:
                  type: string
                  description: >
                    T-shirt size do namespace. Mapeia pra ResourceQuota:
                    small=cpu1/1Gi · medium=cpu4/4Gi · large=cpu8/8Gi.
                  enum:
                    - small
                    - medium
                    - large
                  default: small
              required:
                - teamName
