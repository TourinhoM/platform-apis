apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: appnamespace.platform.lab
spec:
  compositeTypeRef:
    apiVersion: platform.lab/v1alpha1
    kind: XAppNamespace
  mode: Pipeline
  pipeline:
    - step: patch-and-transform
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:

          # Recurso 1: o Namespace
          - name: namespace
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: Namespace
                    metadata:
                      name: placeholder
                      labels:
                        platform.lab/team: placeholder
                providerConfigRef:
                  name: in-cluster
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels["crossplane.io/claim-name"]
                toFieldPath: spec.forProvider.manifest.metadata.name
              - type: FromCompositeFieldPath
                fromFieldPath: spec.teamName
                toFieldPath: spec.forProvider.manifest.metadata.labels["platform.lab/team"]

          # Recurso 2: ResourceQuota com os limites definidos no Claim
          - name: resource-quota
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: ResourceQuota
                    metadata:
                      name: default
                      namespace: placeholder
                    spec:
                      hard:
                        requests.cpu: placeholder
                        requests.memory: placeholder
                        limits.cpu: placeholder
                        limits.memory: placeholder
                providerConfigRef:
                  name: in-cluster
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels["crossplane.io/claim-name"]
                toFieldPath: spec.forProvider.manifest.metadata.namespace
              # size → ResourceQuota: a plataforma é dona dos números; o dev só
              # escolhe o tamanho. requests = limits (teto único do namespace).
              - type: FromCompositeFieldPath
                fromFieldPath: spec.size
                toFieldPath: spec.forProvider.manifest.spec.hard["requests.cpu"]
                transforms:
                  - type: map
                    map: { small: "1", medium: "4", large: "8" }
              - type: FromCompositeFieldPath
                fromFieldPath: spec.size
                toFieldPath: spec.forProvider.manifest.spec.hard["limits.cpu"]
                transforms:
                  - type: map
                    map: { small: "1", medium: "4", large: "8" }
              - type: FromCompositeFieldPath
                fromFieldPath: spec.size
                toFieldPath: spec.forProvider.manifest.spec.hard["requests.memory"]
                transforms:
                  - type: map
                    map: { small: "1Gi", medium: "4Gi", large: "8Gi" }
              - type: FromCompositeFieldPath
                fromFieldPath: spec.size
                toFieldPath: spec.forProvider.manifest.spec.hard["limits.memory"]
                transforms:
                  - type: map
                    map: { small: "1Gi", medium: "4Gi", large: "8Gi" }
