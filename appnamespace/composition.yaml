apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: appnamespace.platform.lab
spec:
  compositeTypeRef:
    apiVersion: platform.lab/v1alpha1
    kind: XAppNamespace
  mode: Pipeline
  pipeline:
    - step: patch-and-transform
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:

          # Recurso 1: o Namespace
          - name: namespace
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: Namespace
                    metadata:
                      name: placeholder
                      labels:
                        platform.lab/team: placeholder
                providerConfigRef:
                  name: in-cluster
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels["crossplane.io/claim-name"]
                toFieldPath: spec.forProvider.manifest.metadata.name
              - type: FromCompositeFieldPath
                fromFieldPath: spec.teamName
                toFieldPath: spec.forProvider.manifest.metadata.labels["platform.lab/team"]

          # Recurso 2: ResourceQuota com os limites definidos no Claim
          - name: resource-quota
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: ResourceQuota
                    metadata:
                      name: default
                      namespace: placeholder
                    spec:
                      hard:
                        # Teto TOTAL do namespace (a cerca de SOMA). Platform owns;
                        # não mais derivado de size. Default são p/ o lab.
                        requests.cpu: "4"
                        requests.memory: 4Gi
                        limits.cpu: "4"
                        limits.memory: 4Gi
                providerConfigRef:
                  name: in-cluster
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels["crossplane.io/claim-name"]
                toFieldPath: spec.forProvider.manifest.metadata.namespace

          # Recurso 3: LimitRange — a cerca POR container. Dá default (pro pod que
          # não declara resources) e min/max (teto/piso por container). É o que
          # permite o dev setar resources LIVRE no gitops sem furar a cerca:
          # admission rejeita acima do max ou abaixo do min.
          - name: limit-range
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: LimitRange
                    metadata:
                      name: default
                      namespace: placeholder
                    spec:
                      limits:
                        # SÓ a cerca (max/min por container). Sem default/
                        # defaultRequest: os valores são do dev (patch de resources
                        # no gitops), não daqui. Admission rejeita container acima
                        # do max ou abaixo do min.
                        - type: Container
                          max: { cpu: "2", memory: 2Gi }
                          min: { cpu: 10m, memory: 16Mi }
                providerConfigRef:
                  name: in-cluster
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.labels["crossplane.io/claim-name"]
                toFieldPath: spec.forProvider.manifest.metadata.namespace
