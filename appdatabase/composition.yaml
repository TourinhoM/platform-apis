apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: appdatabase.platform.lab
spec:
  compositeTypeRef:
    apiVersion: platform.lab/v1alpha1
    kind: XAppDatabase
  mode: Pipeline
  pipeline:
    - step: generate-resources
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $claimName := index .observed.composite.resource.metadata.labels "crossplane.io/claim-name" }}
            {{- $app  := .observed.composite.resource.spec.appName }}
            {{- $env  := .observed.composite.resource.spec.env }}

            {{/* Identificadores postgres: kebab-case -> snake_case (hífen não é
                 válido em role/db sem aspas). user == db. */}}
            {{- $safe := $app | replace "-" "_" }}
            {{- $dbName  := printf "%s_%s" $safe $env }}
            {{- $appUser := printf "%s_%s" $safe $env }}

            {{/* Senha: gera, mas PRESERVA a existente (não rotaciona a cada
                 reconcile, senão dessincroniza postgres x Vault x pod). dig é
                 nil-safe: no 1º reconcile .observed.resources é nil. */}}
            {{- $password := randAlphaNum 24 }}
            {{- $existing := dig "resources" "db-seed" (dict) .observed }}
            {{- if $existing }}
              {{- $enc := dig "resource" "spec" "forProvider" "manifest" "data" "password" "" $existing }}
              {{- if $enc }}{{ $password = $enc | b64dec }}{{- end }}
            {{- end }}

            ---
            # Secret-semente (ns infra): guarda só a senha, estável (sem Update).
            # É o mecanismo de preserve — o template lê de volta daqui no reconcile.
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: db-seed-{{ $claimName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: db-seed
            spec:
              managementPolicies: ["Observe", "Create", "Delete"]
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Secret
                  metadata:
                    name: db-seed-{{ $claimName }}
                    namespace: infra
                  data:
                    password: {{ $password | b64enc }}
              providerConfigRef:
                name: in-cluster

            ---
            # Job: cria user+db no postgres compartilhado E publica a conexão no
            # Vault. Sequência via initContainers (rodam em ordem, todos antes do
            # main): wait-postgres -> create-db (psql) -> main write-vault.
            # O write-vault loga no Vault via k8s auth (role appdatabase-seeder,
            # token EFÊMERO do SA — sem token fixo) e faz kv put. ESO lê de lá.
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: db-init-{{ $claimName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: db-init
            spec:
              managementPolicies: ["Observe", "Create", "Delete"]
              forProvider:
                manifest:
                  apiVersion: batch/v1
                  kind: Job
                  metadata:
                    name: db-init-{{ $claimName }}
                    namespace: infra
                  spec:
                    ttlSecondsAfterFinished: 300
                    backoffLimit: 20
                    template:
                      spec:
                        # SA com role no Vault (k8s auth); token montado p/ o login.
                        serviceAccountName: appdatabase-seeder
                        automountServiceAccountToken: true
                        restartPolicy: OnFailure
                        initContainers:
                          - name: wait-for-postgres
                            image: postgres:16
                            securityContext: &sc
                              runAsNonRoot: true
                              runAsUser: 999
                              allowPrivilegeEscalation: false
                              readOnlyRootFilesystem: true
                              capabilities: { drop: ["ALL"] }
                            resources: &res
                              requests: { cpu: 10m, memory: 32Mi }
                              limits: { cpu: 100m, memory: 64Mi }
                            command: ["/bin/sh", "-c", "until pg_isready -h postgresql -p 5432; do sleep 2; done"]
                          - name: create-db
                            image: postgres:16
                            securityContext: *sc
                            resources: *res
                            env:
                              - name: PGHOST
                                value: postgresql
                              - name: PGUSER
                                value: postgres
                              - name: PGPASSWORD
                                valueFrom:
                                  secretKeyRef: { name: postgresql-auth, key: POSTGRES_PASSWORD }
                              - name: APP_PASSWORD
                                valueFrom:
                                  secretKeyRef: { name: db-seed-{{ $claimName }}, key: password }
                            command:
                              - /bin/sh
                              - -c
                              - |
                                psql -v ON_ERROR_STOP=1 -d postgres -v "app_pw=${APP_PASSWORD}" <<'EOF'
                                  SET "app.pw" = :'app_pw';
                                  DO $body$
                                  DECLARE pw TEXT := current_setting('app.pw');
                                  BEGIN
                                    IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '{{ $appUser }}') THEN
                                      EXECUTE format('CREATE USER {{ $appUser }} WITH PASSWORD %L', pw);
                                    ELSE
                                      EXECUTE format('ALTER USER {{ $appUser }} WITH PASSWORD %L', pw);
                                    END IF;
                                  END $body$;
                                  SELECT 'CREATE DATABASE {{ $dbName }} OWNER {{ $appUser }}'
                                  WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = '{{ $dbName }}')\gexec
                                  GRANT ALL PRIVILEGES ON DATABASE {{ $dbName }} TO {{ $appUser }};
                                EOF
                        containers:
                          - name: write-vault
                            image: hashicorp/vault:1.18
                            securityContext: *sc
                            resources: *res
                            env:
                              - name: VAULT_ADDR
                                value: http://security-vault.vault.svc.cluster.local:8200
                              - name: APP_PASSWORD
                                valueFrom:
                                  secretKeyRef: { name: db-seed-{{ $claimName }}, key: password }
                            command:
                              - /bin/sh
                              - -c
                              - |
                                set -e
                                JWT=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                                VAULT_TOKEN=$(vault write -field=token auth/kubernetes/login \
                                  role=appdatabase-seeder jwt="$JWT")
                                export VAULT_TOKEN
                                # KV v2 no mount `secret` (mesmo que o ESO lê). Chaves batem
                                # 1:1 com o extract do ExternalSecret db-conn. Idempotente.
                                vault kv put secret/databases/{{ $env }}/{{ $app }} \
                                  host=postgresql.infra.svc.cluster.local \
                                  port=5432 \
                                  dbname={{ $dbName }} \
                                  user={{ $appUser }} \
                                  password="$APP_PASSWORD"
              providerConfigRef:
                name: in-cluster
