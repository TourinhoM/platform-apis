apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: appdatabase.platform.lab
spec:
  compositeTypeRef:
    apiVersion: platform.lab/v1alpha1
    kind: XAppDatabase
  mode: Pipeline
  pipeline:
    - step: generate-resources
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $claimName := index .observed.composite.resource.metadata.labels "crossplane.io/claim-name" }}
            {{- $appUser   := .observed.composite.resource.spec.appUser }}
            {{- $dbName    := .observed.composite.resource.spec.databaseName }}
            {{- $appNs     := .observed.composite.resource.spec.appNamespace }}

            {{/* Preserva senha existente para não rotacionar a cada reconciliação */}}
            {{- $password := randAlphaNum 24 }}
            {{- $existing := index .observed.resources "db-creds" }}
            {{- if $existing }}
              {{- $encoded := dig "resource" "spec" "forProvider" "manifest" "data" "password" "" $existing }}
              {{- if $encoded }}{{ $password = $encoded | b64dec }}{{- end }}
            {{- end }}

            ---
            # Secret com a senha gerada — usado pelo Job de bootstrap via volume montado.
            # managementPolicies sem Update: senha nunca é alterada após criação.
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: db-creds-{{ $claimName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: db-creds
            spec:
              managementPolicies:
                - Observe
                - Create
                - Delete
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Secret
                  metadata:
                    name: db-init-creds-{{ $claimName }}
                    namespace: infra
                  data:
                    password: {{ $password | b64enc }}
              providerConfigRef:
                name: in-cluster
            ---
            # Job que cria o banco e o usuário no PostgreSQL compartilhado.
            # Lê a senha do Secret acima via volume — nada em variáveis de ambiente plain text.
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: db-init-job-{{ $claimName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: db-init-job
            spec:
              managementPolicies:
                - Observe
                - Create
                - Delete
              forProvider:
                manifest:
                  apiVersion: batch/v1
                  kind: Job
                  metadata:
                    name: db-init-{{ $claimName }}
                    namespace: infra
                  spec:
                    ttlSecondsAfterFinished: 600
                    template:
                      spec:
                        restartPolicy: OnFailure
                        volumes:
                          - name: db-creds
                            secret:
                              secretName: db-init-creds-{{ $claimName }}
                        containers:
                          - name: create-db
                            image: postgres:15-alpine
                            command:
                              - /bin/sh
                              - -c
                              - |
                                PASSWORD=$(cat /secrets/password)
                                PGURL="postgresql://postgres:$(POSTGRES_ADMIN_PASSWORD)@postgresql:5432/postgres"
                                psql "$PGURL" -c "CREATE USER \"{{ $appUser }}\"" || true
                                psql "$PGURL" -c "ALTER USER \"{{ $appUser }}\" WITH PASSWORD '$PASSWORD'"
                                psql "$PGURL" -c "CREATE DATABASE \"{{ $dbName }}\"" || true
                                psql "$PGURL" -c "GRANT ALL PRIVILEGES ON DATABASE \"{{ $dbName }}\" TO \"{{ $appUser }}\""
                            env:
                              - name: POSTGRES_ADMIN_PASSWORD
                                valueFrom:
                                  secretKeyRef:
                                    name: postgresql-auth
                                    key: POSTGRES_PASSWORD
                            volumeMounts:
                              - name: db-creds
                                mountPath: /secrets
                                readOnly: true
              providerConfigRef:
                name: in-cluster
            ---
            # Secret com connection details no namespace da app.
            # managementPolicies sem Update: alinhado com o db-creds — mesma senha para sempre.
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: db-conn-secret-{{ $claimName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: db-conn-secret
            spec:
              managementPolicies:
                - Observe
                - Create
                - Delete
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Secret
                  metadata:
                    name: {{ $claimName }}-db
                    namespace: {{ $appNs }}
                  data:
                    DATABASE_HOST:     {{ "postgresql.infra.svc.cluster.local" | b64enc }}
                    DATABASE_PORT:     {{ "5432" | b64enc }}
                    DATABASE_NAME:     {{ $dbName | b64enc }}
                    DATABASE_USER:     {{ $appUser | b64enc }}
                    DATABASE_PASSWORD: {{ $password | b64enc }}
                    DATABASE_URL:      {{ printf "postgresql://%s:%s@postgresql.infra.svc.cluster.local:5432/%s" $appUser $password $dbName | b64enc }}
              providerConfigRef:
                name: in-cluster
