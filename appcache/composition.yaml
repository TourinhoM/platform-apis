apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: appcache.platform.lab
spec:
  compositeTypeRef:
    apiVersion: platform.lab/v1alpha1
    kind: XAppCache
  mode: Pipeline
  pipeline:
    - step: generate-resources
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $claimName := index .observed.composite.resource.metadata.labels "crossplane.io/claim-name" }}
            {{- $appNs     := .observed.composite.resource.spec.appNamespace }}

            {{/* Preserva senha existente para não rotacionar a cada reconciliação */}}
            {{- $password := randAlphaNum 24 }}
            {{- /* dig nil-safe: no 1º reconcile .observed.resources é nil
                 e index explode (fatal). Latente até a 1ª claim pós v0.12. */}}
            {{- $existing := dig "resources" "redis-creds" (dict) .observed }}
            {{- if $existing }}
              {{- $encoded := dig "resource" "spec" "forProvider" "manifest" "data" "redis-password" "" $existing }}
              {{- if $encoded }}{{ $password = $encoded | b64dec }}{{- end }}
            {{- end }}

            ---
            # Secret com a senha — referenciado pelo Helm via auth.existingSecret.
            # managementPolicies sem Update: senha nunca é alterada após criação.
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: redis-creds-{{ $claimName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: redis-creds
            spec:
              managementPolicies:
                - Observe
                - Create
                - Delete
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Secret
                  metadata:
                    name: cache-conn  # contrato fixo: gancho envFrom do app-base liga sozinho
                    namespace: {{ $appNs }}
                  data:
                    # redis-password: chave que o chart Bitnami exige (auth.existingSecret).
                    # REDIS_*: chaves env-style pro envFrom da app (hífen é inválido
                    # como nome de env var — envFrom pularia redis-password calado).
                    redis-password: {{ $password | b64enc }}
                    REDIS_HOST:     {{ printf "redis-%s-master.%s.svc.cluster.local" $claimName $appNs | b64enc }}
                    REDIS_PORT:     {{ "6379" | b64enc }}
                    REDIS_PASSWORD: {{ $password | b64enc }}
                    REDIS_URL:      {{ printf "redis://:%s@redis-%s-master.%s.svc.cluster.local:6379" $password $claimName $appNs | b64enc }}
              providerConfigRef:
                name: in-cluster
            ---
            # Helm Release do Redis Bitnami — standalone, sem persistência, recursos mínimos.
            # A senha é lida do Secret acima via auth.existingSecret (nunca em plain text nos values).
            apiVersion: helm.crossplane.io/v1beta1
            kind: Release
            metadata:
              name: redis-{{ $claimName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: redis-release
            spec:
              forProvider:
                chart:
                  name: redis
                  repository: https://charts.bitnami.com/bitnami
                  version: "25.5.3"
                namespace: {{ $appNs }}
                values:
                  architecture: standalone
                  auth:
                    enabled: true
                    existingSecret: cache-conn
                    existingSecretPasswordKey: redis-password
                  master:
                    resources:
                      requests:
                        cpu: 50m
                        memory: 64Mi
                      limits:
                        cpu: 200m
                        memory: 128Mi
                    persistence:
                      enabled: false
                  replica:
                    replicaCount: 0
              providerConfigRef:
                name: in-cluster
            ---
            # Secret com connection details no namespace da app.
            # managementPolicies sem Update: alinhado com redis-creds — mesma senha para sempre.
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: cache-conn-secret-{{ $claimName }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: cache-conn-secret
            spec:
              managementPolicies:
                - Observe
                - Create
                - Delete
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Secret
                  metadata:
                    name: {{ $claimName }}-cache
                    namespace: {{ $appNs }}
                  data:
                    REDIS_HOST:     {{ printf "redis-%s-master.%s.svc.cluster.local" $claimName $appNs | b64enc }}
                    REDIS_PORT:     {{ "6379" | b64enc }}
                    REDIS_PASSWORD: {{ $password | b64enc }}
                    REDIS_URL:      {{ printf "redis://:%s@redis-%s-master.%s.svc.cluster.local:6379" $password $claimName $appNs | b64enc }}
              providerConfigRef:
                name: in-cluster
