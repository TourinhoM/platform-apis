apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apis-appnamespace
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: system
  source:
    repoURL: https://github.com/TourinhoM/platform-apis
    targetRevision: main
    path: appnamespace
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
